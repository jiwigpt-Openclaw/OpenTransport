<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港巴士及小巴到站查詢 - GitHub Learning Project 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <!-- 依需求把首頁主標題縮成更短的版本。 -->
            <h1>🚌 到站查詢</h1>
            <!-- 依需求移除頁面主標題下方的副標文字，讓首頁更乾淨。 -->
        </header>

        <!-- 搜尋區域 -->
        <div class="search-box">
            <div class="input-group">
                <input
                    type="text"
                    id="routeInput"
                    placeholder="輸入路線號，例如 1A、2、104"
                    value="1A"
                    onkeyup="if(event.key === 'Enter') searchETA()">
            </div>
            <button onclick="searchETA()" id="searchBtn">🔍 查詢</button>
        </div>

        <!-- 狀態資訊 -->
        <div id="status" class="status"></div>

        <!-- 結果區域 -->
        <div id="result" class="result">
            <!-- 查詢結果會顯示在這裡 -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>這是我的第一個 GitHub 學習專案 • 使用香港政府開放資料 API</p>
    </footer>

    <script src="script.js?v=20260329-0030"></script>
</body>
</html>
